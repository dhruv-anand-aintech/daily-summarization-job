<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Daily Summarization Job pipeline infographic</title>
  <desc id="desc">A left-to-right workflow: collect local evidence, summarize with Codex, commit reports, deploy the site, and send the email.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffdf7"/>
      <stop offset="1" stop-color="#edf5f0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#19382f" flood-opacity=".14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f6153"/>
    </marker>
    <style>
      .title { font: 800 62px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #10231d; letter-spacing: 0; }
      .subtitle { font: 500 26px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #50615a; }
      .stage { font: 800 28px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #10231d; }
      .body { font: 500 18px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #50615a; }
      .small { font: 700 14px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #2f6153; letter-spacing: .08em; }
    </style>
  </defs>

  <rect width="1600" height="900" rx="0" fill="url(#bg)"/>
  <circle cx="1350" cy="110" r="130" fill="#f2c14e" opacity=".28"/>
  <circle cx="170" cy="780" r="180" fill="#64a6bd" opacity=".16"/>

  <text x="100" y="116" class="small">LOCAL-FIRST AUTOMATION</text>
  <text x="100" y="188" class="title">Daily Summarization Job</text>
  <text x="104" y="234" class="subtitle">Evidence in, audited report out, live link emailed only after deploy.</text>

  <g transform="translate(94 330)">
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="230" height="260" rx="18" fill="#ffffff"/>
      <rect x="0" y="0" width="230" height="12" rx="6" fill="#19382f"/>
    </g>
    <text x="28" y="58" class="stage">Collect</text>
    <text x="28" y="92" class="body">Git activity</text>
    <text x="28" y="122" class="body">Agent transcripts</text>
    <text x="28" y="152" class="body">Kanban context</text>
    <g transform="translate(28 184)">
      <rect width="174" height="42" rx="8" fill="#eef7f1"/>
      <circle cx="24" cy="21" r="8" fill="#2f6153"/>
      <rect x="46" y="14" width="96" height="8" rx="4" fill="#2f6153" opacity=".55"/>
      <rect x="46" y="27" width="68" height="6" rx="3" fill="#2f6153" opacity=".28"/>
    </g>
  </g>

  <path d="M 344 460 H 438" stroke="#2f6153" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g transform="translate(468 330)">
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="230" height="260" rx="18" fill="#ffffff"/>
      <rect x="0" y="0" width="230" height="12" rx="6" fill="#f2c14e"/>
    </g>
    <text x="28" y="58" class="stage">Summarize</text>
    <text x="28" y="92" class="body">Codex exec job</text>
    <text x="28" y="122" class="body">Prompt template</text>
    <text x="28" y="152" class="body">Markdown report</text>
    <g transform="translate(28 184)">
      <rect width="174" height="42" rx="8" fill="#fff6d6"/>
      <path d="M24 29 L42 14 L58 29" fill="none" stroke="#7d6421" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="78" y="13" width="70" height="7" rx="3.5" fill="#7d6421" opacity=".55"/>
      <rect x="78" y="26" width="48" height="6" rx="3" fill="#7d6421" opacity=".3"/>
    </g>
  </g>

  <path d="M 718 460 H 812" stroke="#2f6153" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g transform="translate(842 330)">
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="230" height="260" rx="18" fill="#ffffff"/>
      <rect x="0" y="0" width="230" height="12" rx="6" fill="#64a6bd"/>
    </g>
    <text x="28" y="58" class="stage">Commit</text>
    <text x="28" y="92" class="body">report.md</text>
    <text x="28" y="122" class="body">reports.json</text>
    <text x="28" y="152" class="body">Traceable history</text>
    <g transform="translate(28 184)">
      <rect width="174" height="42" rx="8" fill="#edf7fa"/>
      <circle cx="26" cy="21" r="8" fill="#376b7b"/>
      <circle cx="74" cy="21" r="8" fill="#376b7b"/>
      <circle cx="122" cy="21" r="8" fill="#376b7b"/>
      <path d="M34 21 H66 M82 21 H114" stroke="#376b7b" stroke-width="5" stroke-linecap="round"/>
    </g>
  </g>

  <path d="M 1092 460 H 1186" stroke="#2f6153" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g transform="translate(1216 330)">
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="230" height="260" rx="18" fill="#ffffff"/>
      <rect x="0" y="0" width="230" height="12" rx="6" fill="#2f6153"/>
    </g>
    <text x="28" y="58" class="stage">Deploy</text>
    <text x="28" y="92" class="body">Build static site</text>
    <text x="28" y="122" class="body">Publish assets</text>
    <text x="28" y="152" class="body">Verify live link</text>
    <g transform="translate(28 184)">
      <rect width="174" height="42" rx="8" fill="#eef7f1"/>
      <path d="M28 27 C38 11 59 11 68 27 C77 17 96 18 103 31 H143" fill="none" stroke="#2f6153" stroke-width="6" stroke-linecap="round"/>
    </g>
  </g>

  <g transform="translate(508 690)">
    <rect width="584" height="74" rx="18" fill="#19382f"/>
    <text x="36" y="46" font-family="Inter, ui-sans-serif, system-ui" font-size="24" font-weight="800" fill="#fffdf7">Post-deploy email</text>
    <text x="286" y="46" font-family="Inter, ui-sans-serif, system-ui" font-size="20" font-weight="600" fill="#d8e7de">sent only after the day link is live</text>
    <path d="M520 21 L552 37 L520 53 Z" fill="#f2c14e"/>
  </g>
</svg>
